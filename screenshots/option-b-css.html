<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Option B — CSS Gradient Mesh</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #e8e8e8; display: flex; flex-direction: column; align-items: center; padding: 32px 24px; gap: 24px; }
h1 { font-size: 15px; font-weight: 600; color: #222; }
.sub { font-size: 12px; color: #888; margin-top: 2px; }
.hero-mock {
  width: 100%; max-width: 960px; height: 520px;
  background: #f5f7ff; border-radius: 12px; overflow: hidden;
  display: grid; grid-template-columns: 55fr 45fr;
  box-shadow: 0 4px 32px rgba(0,0,0,0.1);
}
.hero-left { padding: 56px 48px; display: flex; flex-direction: column; justify-content: center; gap: 16px; }
.eyebrow { display: inline-flex; align-items: center; gap: 6px; background: #fff; border: 1px solid #e5e7eb; border-radius: 4px; padding: 4px 10px; font-size: 11px; color: #676767; width: fit-content; }
.dot { width: 6px; height: 6px; background: #204AF8; border-radius: 2px; }
h2 { font-size: 38px; font-weight: 700; letter-spacing: -0.04em; line-height: 1.05; color: #303030; }
h2 span { color: #204AF8; }
.tagline { font-size: 13px; color: #888; line-height: 1.6; max-width: 340px; }
.cta-row { display: flex; gap: 10px; }
.btn-primary { background: #204AF8; color: #fff; border: none; border-radius: 6px; padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-ghost { background: transparent; color: #303030; border: 1px solid #ddd; border-radius: 6px; padding: 10px 20px; font-size: 13px; cursor: pointer; }

/* CSS gradient mesh */
.hero-right {
  border-left: 1px solid rgba(32,74,248,0.08);
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
@keyframes blob1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(30px,-20px) scale(1.12)} }
@keyframes blob2 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-20px,25px) scale(0.92)} 66%{transform:translate(15px,-10px) scale(1.06)} }
@keyframes blob3 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-25px,-15px) scale(1.08)} }
@keyframes blob4 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(20px,20px) scale(0.95)} }
.blob { position: absolute; border-radius: 50%; filter: blur(55px); }
.b1 { width: 260px; height: 260px; background: rgba(32,74,248,0.30); top: -60px; right: -20px; animation: blob1 7s ease-in-out infinite; }
.b2 { width: 200px; height: 200px; background: rgba(246,133,27,0.22); bottom: 20px; right: 60px; animation: blob2 9s ease-in-out infinite; }
.b3 { width: 180px; height: 180px; background: rgba(32,74,248,0.18); top: 80px; left: -20px; animation: blob3 8s ease-in-out infinite; }
.b4 { width: 150px; height: 150px; background: rgba(246,133,27,0.12); bottom: -30px; left: 40px; animation: blob4 6s ease-in-out infinite; }
.grid-overlay {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(32,74,248,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(32,74,248,0.06) 1px, transparent 1px);
  background-size: 36px 36px;
}
.m-center {
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: center;
  width: 64px; height: 64px;
  background: rgba(32,74,248,0.08);
  border: 1px solid rgba(32,74,248,0.2);
  border-radius: 14px;
  backdrop-filter: blur(8px);
}
</style>
</head>
<body>
<h1>Option B — CSS Gradient Mesh</h1>
<p class="sub">Zero JS, animated blobs + grid overlay. Fallback option.</p>
<div class="hero-mock">
  <div class="hero-left">
    <div class="eyebrow"><div class="dot"></div>Web3 Development · AI Agents · Product Studio</div>
    <h2>Full-Stack Web3<br>Development<br><span>&amp; AI Agent Studio</span></h2>
    <p class="tagline">Metaborong builds DeFi protocols, AI agent systems, and custom SaaS products for founders and crypto-native teams.</p>
    <div class="cta-row">
      <button class="btn-primary">Start a Project →</button>
      <button class="btn-ghost">See Our Work</button>
    </div>
  </div>
  <div class="hero-right">
    <div class="b1 blob"></div>
    <div class="b2 blob"></div>
    <div class="b3 blob"></div>
    <div class="b4 blob"></div>
    <div class="grid-overlay"></div>
    <div class="m-center">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="19" viewBox="0 0 52.082 30.457" fill="none">
        <path d="M 10.421 5.234 C 10.421 2.343 12.754 0 15.631 0 C 18.509 0 20.842 2.343 20.842 5.234 L 20.842 10.326 C 20.842 10.326 21.153 12.766 22.164 13.809 C 23.206 14.886 25.723 15.229 25.723 15.229 L 26.382 15.229 C 26.382 15.229 28.898 14.886 29.941 13.809 C 30.799 12.924 31.153 11.031 31.24 10.48 L 31.24 5.234 C 31.24 2.343 33.573 0 36.451 0 C 39.328 0 41.661 2.343 41.661 5.234 L 41.661 10.326 C 41.661 10.326 41.972 12.766 42.983 13.809 C 44.026 14.886 46.542 15.229 46.542 15.229 L 47.852 15.229 C 50.188 15.229 52.082 17.131 52.082 19.477 L 52.082 30.457 L 41.661 30.457 L 41.661 15.229 L 36.121 15.229 C 36.121 15.229 33.605 15.571 32.562 16.648 C 31.704 17.534 31.35 19.426 31.263 19.977 L 31.263 25.224 C 31.263 28.114 28.93 30.457 26.052 30.457 C 23.175 30.457 20.842 28.114 20.842 25.224 L 20.842 20.131 C 20.842 20.131 20.501 17.604 19.429 16.556 C 18.39 15.541 15.961 15.229 15.961 15.229 L 10.421 15.229 L 10.421 30.457 L 0 30.457 L 0 19.477 C 0 17.131 1.894 15.229 4.23 15.229 L 5.54 15.229 C 5.54 15.229 8.056 14.886 9.099 13.809 C 10.11 12.766 10.421 10.326 10.421 10.326 L 10.421 5.234 Z" fill="#204AF8" fill-rule="evenodd"/>
      </svg>
    </div>
  </div>
</div>
</body>
</html>
