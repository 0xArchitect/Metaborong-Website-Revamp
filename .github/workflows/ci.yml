name: CI
on:
  pull_request:
  push:
    branches: [main, design-revamp]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mongo:
        image: mongo:7
        ports: ['27017:27017']
    env:
      MONGODB_URI: mongodb://localhost:27017/mb-ci
      AUTH_SECRET: ci-dummy-secret-0123456789abcdef0123456789abcdef
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4        # reads packageManager from package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      # Warm the mongodb-memory-server binary cache single-threaded first:
      # parallel Vitest workers racing the cold-cache download fail with
      # lockfile/ETXTBSY errors (first CI run, 2026-06-12).
      - run: node -e "import('mongodb-memory-server').then(async (m) => { const s = await m.MongoMemoryServer.create(); await s.stop(); })"
      - run: pnpm test
      - run: pnpm build

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true   # 35 known deferred errors — signal, not gate
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
